<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pelaporan Penyakit</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            corePlugins: { preflight: false }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-[#2b70c9] to-[#2abeb6] font-sans m-0 h-screen flex items-center justify-center">

    <div id="auth-container" class="group bg-white rounded-[10px] shadow-[0_14px_28px_rgba(0,0,0,0.25),0_10px_10px_rgba(0,0,0,0.22)] relative overflow-hidden w-[768px] max-w-[90%] min-h-[480px]">

        <div class="absolute top-0 left-0 h-full w-1/2 opacity-0 z-10 transition-all duration-700 ease-in-out group-[.is-sign-up]:translate-x-full group-[.is-sign-up]:opacity-100 group-[.is-sign-up]:z-50 bg-white">
            <form onsubmit="event.preventDefault(); window.location.href='index.html';" class="flex flex-col items-center justify-center px-12 h-full text-center">
                <h2 class="font-bold text-3xl mb-2 text-[#112338]">Buat Akun</h2>
                <span class="text-xs text-gray-500 mb-4">Langsung aja</span>
                <input type="text" placeholder="Nama Lengkap" required class="bg-gray-100 border-none p-3 my-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-[#3498db]" />
                <input type="email" placeholder="Email" required class="bg-gray-100 border-none p-3 my-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-[#3498db]"/>
                <input type="password" placeholder="Kata Sandi" required class="bg-gray-100 border-none p-3 my-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-[#3498db]"/>
                <button type="submit" class="rounded-full bg-[#3498db] text-white text-xs font-bold py-3 px-11 uppercase tracking-wider transition-transform active:scale-95 focus:outline-none mt-4 border-none cursor-pointer">Daftar</button>
            </form>
        </div>

        <div class="absolute top-0 left-0 h-full w-1/2 z-20 transition-all duration-700 ease-in-out group-[.is-sign-up]:translate-x-full bg-white">
            <form onsubmit="event.preventDefault(); window.location.href='index.html';" class="flex flex-col items-center justify-center px-12 h-full text-center">
                <h2 class="font-bold text-3xl mb-2 text-[#112338]">Masuk</h2>
                <span class="text-xs text-gray-500 mb-4">Gas masuk</span>
                <input type="email" placeholder="Email" required class="bg-gray-100 border-none p-3 my-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-[#3498db]" />
                <input type="password" placeholder="Kata Sandi" required class="bg-gray-100 border-none p-3 my-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-[#3498db]"/>
                <a href="#" class="text-gray-600 text-sm no-underline my-4 hover:underline">Lupa kata sandi?</a>
                <button type="submit" class="rounded-full bg-[#3498db] text-white text-xs font-bold py-3 px-11 uppercase tracking-wider transition-transform active:scale-95 focus:outline-none mt-2 border-none cursor-pointer">Masuk</button>
            </form>
        </div>

        <div class="absolute top-0 left-1/2 w-1/2 h-full overflow-hidden transition-transform duration-700 ease-in-out z-[100] group-[.is-sign-up]:-translate-x-full">
            <div class="flex h-full w-[200%] bg-gradient-to-r from-[#2b70c9] to-[#2abeb6] text-white transition-transform duration-700 ease-in-out -translate-x-1/2 group-[.is-sign-up]:translate-x-0">
                <div class="flex flex-col items-center justify-center px-10 text-center h-full w-1/2 transition-transform duration-700 ease-in-out -translate-x-[20%] group-[.is-sign-up]:translate-x-0">
                    <h2 class="font-bold text-3xl mb-4 text-white">Selamat Datang!</h2>
                    <p class="text-sm font-light leading-relaxed tracking-wide mb-8 text-white">Silakan masuk dengan akun Anda untuk mengakses sistem pelaporan</p>
                    <button id="signInBtn" type="button" class="rounded-full bg-transparent border border-white text-white text-xs font-bold py-3 px-11 uppercase tracking-wider transition-transform active:scale-95 focus:outline-none cursor-pointer">Masuk</button>
                </div>
                <div class="flex flex-col items-center justify-center px-10 text-center h-full w-1/2 transition-transform duration-700 ease-in-out translate-x-0 group-[.is-sign-up]:translate-x-[20%]">
                    <h2 class="font-bold text-3xl mb-4 text-white">Halo, Karyawan!</h2>
                    <p class="text-sm font-light leading-relaxed tracking-wide mb-8 text-white">Daftarkan diri Anda dan mulai berkontribusi dalam pelaporan penyakit</p>
                    <button id="signUpBtn" type="button" class="rounded-full bg-transparent border border-white text-white text-xs font-bold py-3 px-11 uppercase tracking-wider transition-transform active:scale-95 focus:outline-none cursor-pointer">Daftar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signUpBtn = document.getElementById('signUpBtn');
        const signInBtn = document.getElementById('signInBtn');
        const authContainer = document.getElementById('auth-container');

        signUpBtn.addEventListener('click', () => {
            authContainer.classList.add("is-sign-up");
        });

        signInBtn.addEventListener('click', () => {
            authContainer.classList.remove("is-sign-up");
        });
    </script>
</body>
</html>
