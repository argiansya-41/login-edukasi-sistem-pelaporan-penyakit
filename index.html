<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pelaporan Penyakit</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hero-section">
        <img src="image_0.png" alt="Visualisasi Data Penyakit" class="hero-image">
        <div class="hero-overlay"></div>
        
       <div style="position: absolute; top: 20px; right: 20px; z-index: 10; display: flex; gap: 15px;">
            <button onclick="window.location.href='edukasi.html'" style="margin: 0; width: auto; padding: 8px 18px; background: #3498db; border: none; font-weight: bold; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); color: white; cursor: pointer;">📚 Informasi</button>
            
            <button onclick="window.location.href='login.html'" style="margin: 0; width: auto; padding: 8px 18px; background: rgba(255,255,255,0.2); border: 1px solid white; border-radius: 5px; color: white; cursor: pointer;">Keluar</button>
        </div>

        <header class="hero-header">
            <h1>Sistem Pelaporan Penyakit</h1>
            <p>Monitoring kasus penyakit</p>
        </header>
    </div>

    <div class="container">
        <div class="grid-layout">
            <div class="card">
                <h2>Input Data Pasien</h2>
                <form id="formPenyakit">
                    <div class="form-group">
                        <label for="nama">Nama Pasien</label>
                        <input type="text" id="nama" required>
                    </div>
                    <div class="form-group">
                        <label for="usia">Usia</label>
                        <input type="number" id="usia" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="alamat">Alamat Lengkap</label>
                        <textarea id="alamat" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="gejala">Gejala Klinis</label>
                        <input type="text" id="gejala" placeholder="Contoh: Demam tinggi, mual" required>
                    </div>
                    <div class="form-group">
                        <label for="diagnosis">Diagnosis Penyakit</label>
                        <select id="diagnosis" required>
                            <option value="">Pilih Diagnosis...</option>
                            <option value="Demam Berdarah">Demam Berdarah (DBD)</option>
                            <option value="Tifus">Tifus / Tipes</option>
                            <option value="Diare">Diare Parah</option>
                            <option value="Influenza">Influenza</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="waktu">Waktu Penemuan</label>
                        <input type="date" id="waktu" required>
                    </div>
                    <div class="form-group">
                        <label for="kabupaten">Lokasi (Kabupaten/Kota)</label>
                        <select id="kabupaten" required>
                            <option value="">Pilih Kabupaten/Kota...</option>
                            <option value="Kabupaten Madiun">Kabupaten Madiun</option>
                            <option value="Kota Madiun">Kota Madiun</option>
                            <option value="Kabupaten Magetan">Kabupaten Magetan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="lokasi">Lokasi (Kecamatan)</label>
                        <select id="lokasi" required disabled>
                            <option value="">Pilih Kabupaten terlebih dahulu...</option>
                        </select>
                    </div>
                    <button type="submit">Simpan Data</button>
                </form>
            </div>

            <div class="card">
                <h2>Peta Persebaran Kasus</h2>
                <div id="map" style="height: 650px;"></div> 
                <div class="card-separator"></div>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>Riwayat Laporan Penyakit</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Nama Pasien</th>
                            <th>Usia</th>
                            <th>Alamat Lengkap</th>
                            <th>Gejala Klinis</th>
                            <th>Diagnosis</th>
                            <th>Lokasi</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="bodyTabelRiwayat">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <div style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-bottom: 20px;">
                <h2 style="border: none; padding: 0; margin: 0; color: var(--primary-color);">Grafik Tren Penyakit</h2>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label for="filterBulan" style="margin: 0; font-weight: bold; color: var(--primary-color);">Filter Bulan:</label>
                    <select id="filterBulan" style="width: auto; min-width: 150px; margin: 0; padding: 8px;">
                        <option value="semua">Semua Waktu (Akumulasi)</option>
                        <option value="0">Januari</option>
                        <option value="1">Februari</option>
                        <option value="2">Maret</option>
                        <option value="3">April</option>
                        <option value="4">Mei</option>
                        <option value="5">Juni</option>
                        <option value="6">Juli</option>
                        <option value="7">Agustus</option>
                        <option value="8">September</option>
                        <option value="9">Oktober</option>
                        <option value="10">November</option>
                        <option value="11">Desember</option>
                    </select>
                </div>
            </div>
            <div class="chart-container" style="margin-bottom: 0;">
                <canvas id="trendChart" height="80"></canvas> 
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
